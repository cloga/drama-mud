server {
  listen 80;
  server_name __SERVER_NAME__;
  root /var/www/drama-mud/current;

  location = / {
    return 302 /trinity-alpha/;
  }

  location = /trinity-alpha {
    return 301 /trinity-alpha/;
  }

  location /trinity-alpha/ {
    proxy_pass http://__TRINITY_ALPHA_UPSTREAM__/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect ~^(/.*)$ /trinity-alpha$1;
    sub_filter_once off;
    sub_filter 'href="/' 'href="/trinity-alpha/';
    sub_filter 'src="/' 'src="/trinity-alpha/';
    sub_filter 'action="/' 'action="/trinity-alpha/';
  }

  location = __APP_BASE_PATH_NO_TRAILING__ {
    return 301 __APP_BASE_PATH__;
  }

  location ^~ __APP_BASE_PATH__api/ {
    rewrite ^__APP_BASE_PATH__api/(.*)$ /api/$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ __APP_BASE_PATH__ws {
    proxy_pass http://127.0.0.1:3001/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location __APP_BASE_PATH__ {
    try_files $uri $uri/ __APP_BASE_PATH__index.html;
  }
}
